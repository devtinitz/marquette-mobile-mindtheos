<!DOCTYPE html>

<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#ffdad6",
            "error": "#ba1a1a",
            "on-primary-fixed-variant": "#133ca8",
            "on-surface-variant": "#444653",
            "primary-container": "#0033a0",
            "tertiary-fixed-dim": "#ffb5a0",
            "surface": "#f9f9f9",
            "secondary-container": "#c4dcff",
            "outline-variant": "#c4c5d5",
            "surface-container-highest": "#e2e2e2",
            "tertiary-fixed": "#ffdbd1",
            "primary-fixed": "#dce1ff",
            "on-surface": "#1a1c1c",
            "secondary": "#49607e",
            "on-secondary-fixed-variant": "#314865",
            "secondary-fixed-dim": "#b0c8eb",
            "on-primary": "#ffffff",
            "surface-container-high": "#e8e8e8",
            "inverse-primary": "#b6c4ff",
            "surface-variant": "#e2e2e2",
            "on-tertiary": "#ffffff",
            "background": "#f9f9f9",
            "on-secondary-fixed": "#001c37",
            "inverse-surface": "#2f3131",
            "on-primary-container": "#8ea6ff",
            "primary-fixed-dim": "#b6c4ff",
            "on-primary-fixed": "#001550",
            "on-error-container": "#93000a",
            "secondary-fixed": "#d2e4ff",
            "surface-container-low": "#f3f3f4",
            "tertiary": "#531100",
            "on-background": "#1a1c1c",
            "surface-tint": "#3456c1",
            "surface-dim": "#dadada",
            "tertiary-container": "#791d00",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed-variant": "#842506",
            "on-secondary-container": "#49617f",
            "outline": "#747684",
            "on-tertiary-container": "#ff8a68",
            "surface-container": "#eeeeee",
            "primary": "#00216e",
            "inverse-on-surface": "#f0f1f1",
            "surface-bright": "#f9f9f9",
            "surface-container-lowest": "#ffffff",
            "on-error": "#ffffff",
            "on-tertiary-fixed": "#3b0900"
          },
          fontFamily: {
            "headline": ["Inter", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .brain-pattern {
      background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.03) 1px, transparent 0);
      background-size: 24px 24px;
    }

    /* Barre de progression */
    @keyframes progress {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    #progress-bar {
      animation: progress 4s linear forwards;
    }

    /* Fondu de sortie */
    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    body.fading {
      animation: fadeOut 0.5s ease forwards;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <script src="mobile-frame.js"></script>

</head>

<body class="bg-[#0A2540] text-on-primary font-body overflow-hidden">
  <main class="relative h-screen w-full flex flex-col items-center justify-center p-6 brain-pattern">
    <div
      class="absolute inset-0 bg-gradient-to-b from-[#0A2540] via-[#0D2D4D] to-[#0A2540] opacity-50 pointer-events-none">
    </div>
    <div class="relative z-10 flex flex-col items-center max-w-md w-full">
      <div class="mb-10 flex flex-col items-center">
        <div
          class="w-32 h-32 md:w-40 md:h-40 bg-white/5 backdrop-blur-xl rounded-[32px] flex items-center justify-center mb-8 shadow-2xl ring-1 ring-white/10">
          <span class="material-symbols-outlined text-white text-6xl md:text-7xl" data-icon="psychology"
            style="font-variation-settings: 'FILL' 1;">
            psychology
          </span>
        </div>
        <h1 class="text-white text-4xl md:text-5xl font-extrabold tracking-tight mb-2">
          Mindtheos
        </h1>
      </div>
      <div
        class="inline-flex items-center bg-[#FFD700] px-4 py-1.5 rounded-full mb-10 shadow-[0_0_20px_rgba(255,215,0,0.2)]">
        <span class="text-[#0A2540] text-xs md:text-sm font-bold tracking-wide">
          Votre copilote IA pour mieux gérer
        </span>
      </div>
      <div class="flex flex-col items-center space-y-3 text-center">
        <p class="text-white text-base md:text-lg font-medium opacity-90 tracking-wide">
          Pilotez votre entreprise avec intelligence
        </p>
        <p class="text-white/60 text-sm md:text-base font-normal tracking-wider">
          Le cockpit intelligent pour la croissance
        </p>
      </div>
    </div>

    <!-- Barre de progression en bas -->
    <div class="absolute bottom-16 flex flex-col items-center w-full px-6">
      <div class="w-32 h-1 bg-white/10 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-white/50 rounded-full" style="width: 0%"></div>
      </div>
    </div>
  </main>

  <script>
    // Redirection automatique après 4 secondes avec fondu
    setTimeout(function () {
      document.body.classList.add('fading');
      setTimeout(function () {
        window.location.href = 'connexion_screen.html';
      }, 500); // attend la fin du fondu (0.5s) avant de rediriger
    }, 4000);
  </script>
</body>

</html>
