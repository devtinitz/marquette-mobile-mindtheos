<!DOCTYPE html>

<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

                extend: {

                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",

                        "secondary-container": "#c4dcff",
                        "tertiary-fixed": "#6ffbbe",
                        "background": "#f9f9ff",
                        "on-secondary-fixed-variant": "#314865",
                        "inverse-surface": "#293040",
                        "surface-container-highest": "#dce2f7",
                        "surface-container-low": "#f1f3ff",
                        "tertiary-container": "#002a1a",
                        "primary-fixed": "#dce1ff",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#edf0ff",
                        "on-surface": "#141b2b",
                        "tertiary-fixed-dim": "#4edea3",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e1e8fd",
                        "surface-tint": "#3456c1",
                        "secondary-fixed-dim": "#b0c8eb",
                        "surface-container": "#e9edff",
                        "primary": "#000a33",
                        "on-surface-variant": "#43474d",
                        "on-primary-container": "#6684f2",
                        "outline": "#74777e",
                        "outline-variant": "#c4c6ce",
                        "on-error": "#ffffff",
                        "secondary": "#49607e",
                        "inverse-primary": "#b6c4ff",
                        "tertiary": "#001209",
                        "on-tertiary-fixed": "#002113",
                        "primary-container": "#001c63",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#001c37",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface-variant": "#dce2f7",
                        "on-tertiary-container": "#009e6d",
                        "primary-fixed-dim": "#b6c4ff",
                        "secondary-fixed": "#d2e4ff",
                        "on-primary-fixed": "#001550",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-background": "#141b2b",
                        "on-primary-fixed-variant": "#133ca8",
                        "surface": "#f9f9ff",
                        "surface-dim": "#d3daef",
                        "on-secondary-container": "#49617f"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .action-gradient {
            background: linear-gradient(135deg, #000a33 0%, #6684f2 100%);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
    <!-- Split Background -->
    <div class="fixed top-0 left-0 w-full h-[353px] bg-[#0A2540] z-0">
        <div class="absolute inset-0 opacity-10"
            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDv8F_tRK0ALyKZXWKldBGgl0A_Cnb6FKiJWRw3qQBeNdnNX801PqMYLeZdd840_AQNpZ9DXYJw0Raor76sA_Q3fpgBxjpLwaUCy9gl1husDT04bvpus6asNV_yYcZGYzr7stuTazwwcq7p56r5s6fMUce2QN67QdA2GHzbcFjEkiPW5uuTcMJcUrQz8ivOtt5sDxsKDXjvOh66MvtazZfw-zCP5CEe_7n5qgkQImMvr1gyOh7NYnk_AXQoTykPAm3NpU-_0mrRraQw');">
        </div>
    </div>
    <!-- Main Content Canvas -->
    <main class="relative z-10 flex-grow flex items-center justify-center px-4 py-12 md:py-24">
        <div class="w-full max-w-lg">
            <!-- Logo Section -->
            <div class="flex flex-col items-center mb-8">
                <div class="bg-surface-container-lowest p-3 rounded-xl mb-4 shadow-sm">
                    <span class="material-symbols-outlined text-primary text-3xl">corporate_fare</span>
                </div>
                <h1 class="text-surface-container-lowest font-bold text-2xl tracking-tight">Executive Core</h1>
            </div>
            <!-- Registration Card -->
            <div
                class="bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_rgba(10,37,64,0.08)] overflow-hidden">
                <div class="p-8 md:p-10">
                    <!-- Header -->
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-[18px] font-semibold text-on-surface">Créez votre compte</h2>
                            <p class="text-on-surface-variant text-sm mt-1">Commencez votre voyage vers l'excellence.
                            </p>
                        </div>
                        <div class="flex flex-col items-end">
                            <span
                                class="text-label-md font-bold text-on-primary-fixed-variant tracking-widest uppercase text-[10px]">Step
                                1/3</span>
                            <div class="flex gap-1 mt-2">
                                <div class="h-1 w-6 rounded-full bg-on-primary-fixed-variant"></div>
                                <div class="h-1 w-6 rounded-full bg-surface-container-high"></div>
                                <div class="h-1 w-6 rounded-full bg-surface-container-high"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Badge -->
                    <div
                        class="inline-flex items-center gap-2 bg-tertiary-fixed text-on-tertiary-fixed-variant px-3 py-1.5 rounded-full mb-8">
                        <span class="material-symbols-outlined text-sm"
                            style="font-variation-settings: 'FILL' 1;">verified</span>
                        <span class="text-[11px] font-semibold uppercase tracking-wider">Essai gratuit 14 jours • Sans
                            carte bancaire</span>
                    </div>
                    <!-- Form -->
                    <form action="#" class="space-y-6">
                        <div class="space-y-4">
                            <!-- Field: Full Name -->
                            <div class="group">
                                <label
                                    class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-1">Nom
                                    complet</label>
                                <div class="relative">
                                    <span
                                        class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">person</span>
                                    <input
                                        class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-on-primary-container/20 text-on-surface placeholder:text-on-surface-variant/40 transition-all"
                                        placeholder="Jean Dupont" type="text" />
                                </div>
                            </div>
                            <!-- Field: Email -->
                            <div class="group">
                                <label
                                    class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-1">Email
                                    pro</label>
                                <div class="relative">
                                    <span
                                        class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">mail</span>
                                    <input
                                        class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-on-primary-container/20 text-on-surface placeholder:text-on-surface-variant/40 transition-all"
                                        placeholder="jean.dupont@entreprise.com" type="email" />
                                </div>
                            </div>
                            <!-- Field Grid for Passwords -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="group">
                                    <label
                                        class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-1">Password</label>
                                    <div class="relative">
                                        <span
                                            class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">lock</span>
                                        <input
                                            class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-on-primary-container/20 text-on-surface placeholder:text-on-surface-variant/40 transition-all"
                                            placeholder="••••••••" type="password" />
                                    </div>
                                </div>
                                <div class="group">
                                    <label
                                        class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5 ml-1">Confirm
                                        password</label>
                                    <div class="relative">
                                        <span
                                            class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">lock_reset</span>
                                        <input
                                            class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-on-primary-container/20 text-on-surface placeholder:text-on-surface-variant/40 transition-all"
                                            placeholder="••••••••" type="password" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Submit Button -->
                        <button
                            class="action-gradient w-full py-4 rounded-lg text-on-primary font-bold text-md flex items-center justify-center gap-3 active:scale-[0.98] transition-all shadow-lg shadow-primary/20 mt-8"
                            type="submit">
                            <span>Continuer</span>
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </form>
                    <!-- Footer Link -->
                    <div class="mt-8 pt-8 border-t border-surface-container-low flex justify-center">
                        <p class="text-on-surface-variant text-sm">
                            Déjà un compte ?
                            <a class="text-on-primary-fixed-variant font-bold hover:underline ml-1" href="#">Se
                                connecter</a>
                        </p>
                    </div>
                </div>
            </div>
            <!-- Trust Badges -->
            <div class="mt-10 flex flex-wrap justify-center gap-x-8 gap-y-4 opacity-40 grayscale pointer-events-none">
                <img class="h-6"
                    data-alt="minimalist tech logo of a security firm clean lines navy blue on transparent background"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaLy9BuKGWGU4Asc4ziWouOzI_OkS2K_5EoHbA1tB7I-j5PqISGMBMmoGsteqpOTYMwUNrQfUGVNHhmChU-8oQJdcnMXtevtnVKXoPD9Q0ek9OGyr_5Phwiv9t8yMOl05dat8sNCQk3dlyV-RxyN_zOkYIimobQMs1cb_d8_qoYD1AT3Gwaj3Wd1IZVZ6n6viLtObR9aPtA7ST1FYLV3JPjbkvPDYkSB6kHRV2a5YrXF0FbAiv8CyOsPH1FnNAdgj3oWciVkWoGjg3" />
                <img class="h-6" data-alt="abstract geometric logo of a cloud computing provider professional aesthetic"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDnImxG-R1rx49_-oR0s_2slxhIARgYNvagcSRb2I26bjh7uJvKn4oWnwn__GVn-bEwqzPiHP9TcmO2vGYgyqlc7lmePpM1xae5OSvLodx3FDlqaNFZF73T1O2Jlue_0N2LcXgGbQ_sL9wS05ELJ-6j0mA8Ee71cGljmbgmseThlYQDjm472dDyOAg0WMFtQTtjorG3GS1TRl-UVUg1mhRjR9D8DcXQYfQ0vRcIA7XuYZ0f3h0QMQd-U_byeJjKCBugYKUskDLO5lvj" />
                <img class="h-6"
                    data-alt="corporate enterprise logo for a data privacy standard compliance organization"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAajWEALcOCvUbE4ad3oKHf4po7WnbJqEfcRB0WHGrr4tC6IdAXNa3a1JbC7z0NI_FuTgI30IzCo1hyWoVz0BKboJjuGWJj6NVtWa8IZh8kIwfmMW2208YPGtqQ0j65XIstEdm9gX3hBGlzcmVqLQlHZxqFrkHmLkfN_ZoudIYfO-DXKXVj72uuZynVXee1PxxgfmQGZEmEcR5NJMyIhxQm_ExylqrARdDOpK8gGQGERu141NqP6HxWH3x_G-yPjaGJaBZnxNU4FKfB" />
            </div>
        </div>
    </main>
    <!-- Support Footer -->
    <footer
        class="relative z-10 w-full py-6 px-6 flex justify-between items-center text-[10px] font-medium text-on-surface-variant uppercase tracking-widest">
        <div>© 2024 Executive Core</div>
        <div class="flex gap-4">
            <a class="hover:text-primary transition-colors" href="#">Politique de confidentialité</a>
            <a class="hover:text-primary transition-colors" href="#">Support</a>
        </div>
    </footer>
</body>

</html>
